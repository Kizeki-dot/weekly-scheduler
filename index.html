<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Scheduler Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #dbeafe, #f5d0fe);
  min-height: 100vh;
  padding: 20px;
  color: #1e293b;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  flex-wrap: wrap;
  gap: 15px;
}

.title {
  font-size: 34px;
  font-weight: 700;
  color: #0f172a;
}

.subtitle {
  color: #475569;
  margin-top: 5px;
  font-size: 14px;
}

.controls {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

select,
input {
  border: none;
  padding: 14px;
  border-radius: 16px;
  background: #f8fafc;
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}

select:focus,
input:focus {
  background: white;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
}

.add-btn {
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  padding: 14px;
  transition: 0.2s;
}

.add-btn:hover {
  transform: translateY(-2px);
  opacity: 0.95;
}

.board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}

.day-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.day-card:hover {
  transform: translateY(-4px);
}

.day-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.day-title {
  font-size: 20px;
  font-weight: 700;
}

.task-count {
  background: #eef2ff;
  color: #4f46e5;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}

.task {
  background: white;
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  animation: fadeIn 0.25s ease;
}

.task-time {
  color: #6366f1;
  font-weight: 700;
  margin-bottom: 6px;
  font-size: 14px;
}

.task-text {
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
  margin-bottom: 12px;
}

.task-buttons {
  display: flex;
  gap: 10px;
}

.task-buttons button {
  flex: 1;
  border: none;
  padding: 10px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.edit-btn {
  background: #e0f2fe;
  color: #0284c7;
}

.delete-btn {
  background: #fee2e2;
  color: #dc2626;
}

.task-buttons button:hover {
  transform: scale(0.98);
}

.empty {
  color: #64748b;
  text-align: center;
  padding: 18px 0;
  font-size: 14px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media(max-width:700px) {
  .title { font-size: 28px; }
  .controls { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <div>
      <div class="title">Weekly Scheduler</div>
      <div class="subtitle">Modern planner with auto save</div>
    </div>
  </div>

  <div class="controls">

    <select id="day">
      <option>Mon</option>
      <option>Tue</option>
      <option>Wed</option>
      <option>Thu</option>
      <option>Fri</option>
      <option>Sat</option>
      <option>Sun</option>
    </select>

    <div style="display:flex;flex-direction:column;gap:5px;">

  <span style="font-size:12px;color:#64748b;">Select time</span>

  <div style="display:flex;align-items:center;gap:10px;">
    
    <input type="time" id="time">

    <div id="ampmBox" style="
      padding:10px 12px;
      border-radius:12px;
      background:#eef2ff;
      color:#4f46e5;
      font-weight:700;
      font-size:14px;
      min-width:60px;
      text-align:center;
    ">
      --
    </div>

  </div>

</div>

    <input type="text" id="task" placeholder="Enter your task...">

    <button class="add-btn" onclick="addTask()">Add Task</button>

  </div>

  <div class="board" id="board"></div>

</div>

<script>

  document.getElementById('time').addEventListener('change', function () {
  const value = this.value;
  if (!value) return;

  let [h] = value.split(':');
  h = parseInt(h);

  const ampm = h >= 12 ? 'PM' : 'AM';

  document.getElementById('ampmBox').innerText = ampm;
});

const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let data = JSON.parse(localStorage.getItem('weeklySchedulerPro')) || {
  Mon: [], Tue: [], Wed: [], Thu: [], Fri: [], Sat: [], Sun: []
};

function saveData(){
  localStorage.setItem('weeklySchedulerPro', JSON.stringify(data));
}

// Convert 24h -> 12h AM/PM
function convertTo12Hour(time24){
  let [h,m] = time24.split(':');
  h = parseInt(h);

  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12;
  if(h === 0) h = 12;

  return `${h.toString().padStart(2,'0')}:${m} ${ampm}`;
}

// Convert 12h -> 24h (for sorting)
function convertTo24Hour(time12){
  let [time,ampm] = time12.split(' ');
  let [h,m] = time.split(':');

  h = parseInt(h);

  if(ampm === 'PM' && h < 12) h += 12;
  if(ampm === 'AM' && h === 12) h = 0;

  return `${h.toString().padStart(2,'0')}:${m}`;
}

function addTask(){

  const day = document.getElementById('day').value;
  const rawTime = document.getElementById('time').value;
  const task = document.getElementById('task').value.trim();

  if(!rawTime || !task){
    alert('Please fill all fields');
    return;
  }

  const displayTime = convertTo12Hour(rawTime);

  data[day].push({
    time: displayTime,
    rawTime: convertTo24Hour(displayTime),
    task
  });

  data[day].sort((a,b)=>a.rawTime.localeCompare(b.rawTime));

  saveData();
  render();

  document.getElementById('task').value = '';
}

function deleteTask(day,index){
  data[day].splice(index,1);
  saveData();
  render();
}

function editTask(day,index){
  const newTask = prompt('Edit Task', data[day][index].task);
  if(newTask === null) return;
  data[day][index].task = newTask;
  saveData();
  render();
}

function render(){

  const board = document.getElementById('board');
  board.innerHTML = '';

  days.forEach(day => {

    const card = document.createElement('div');
    card.className = 'day-card';

    let html = `
      <div class="day-header">
        <div class="day-title">${day}</div>
        <div class="task-count">${data[day].length} Tasks</div>
      </div>
    `;

    if(data[day].length === 0){
      html += `<div class="empty">No tasks yet</div>`;
    }

    data[day].forEach((item,index)=>{
      html += `
        <div class="task">
          <div class="task-time">${item.time}</div>
          <div class="task-text">${item.task}</div>
          <div class="task-buttons">
            <button class="edit-btn" onclick="editTask('${day}',${index})">Edit</button>
            <button class="delete-btn" onclick="deleteTask('${day}',${index})">Delete</button>
          </div>
        </div>
      `;
    });

    card.innerHTML = html;
    board.appendChild(card);

  });
  // 1. Register Service Worker & Request Permission
if ('serviceWorker' in navigator && 'Notification' in window) {
  navigator.serviceWorker.register('sw.js')
    .then(() => {
      console.log("Service Worker Registered");
      return Notification.requestPermission();
    })
    .then(permission => {
      if (permission === 'granted') console.log("Notifications allowed");
    });
}

// 2. Modified addTask function to include notification logic
function addTask() {
  const day = document.getElementById('day').value;
  const rawTime = document.getElementById('time').value;
  const task = document.getElementById('task').value.trim();

  if (!rawTime || !task) {
    alert('Please fill all fields');
    return;
  }

  const displayTime = convertTo12Hour(rawTime);
  const newTaskObj = {
    time: displayTime,
    rawTime: convertTo24Hour(displayTime),
    task
  };

  data[day].push(newTaskObj);
  data[day].sort((a, b) => a.rawTime.localeCompare(b.rawTime));

  saveData();
  render();

  // --- Notification Logic Start ---
  scheduleNotification(newTaskObj);
  // --- Notification Logic End ---

  document.getElementById('task').value = '';
}

// 3. Helper to send data to Service Worker
function scheduleNotification(taskObj) {
  if (Notification.permission !== 'granted') return;

  // Calculate delay (Simplified: assumes task is for today)
  const [hours, minutes] = taskObj.rawTime.split(':');
  const targetDate = new Date();
  targetDate.setHours(parseInt(hours), parseInt(minutes), 0, 0);

  const delay = targetDate.getTime() - Date.now();

  if (delay > 0) {
    navigator.serviceWorker.ready.then(registration => {
      navigator.serviceWorker.controller.postMessage({
        type: 'SCHEDULE_NOTIFICATION',
        title: 'Task Reminder!',
        body: taskObj.task,
        delay: delay
      });
    });
  }
}
}

render();
</script>

</body>
</html>
